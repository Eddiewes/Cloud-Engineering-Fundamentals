<svg viewBox="0 0 1100 860" xmlns="http://www.w3.org/2000/svg" width="1100" height="860">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="860" fill="#f0f4f8"/>

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a2332" font-family="Arial">Improved AWS Two-Tier Architecture</text>
  <text x="550" y="50" text-anchor="middle" font-size="11" fill="#555" font-family="Arial">Multi-AZ | High Availability | Secure | Scalable</text>

  <!-- INTERNET / USERS -->
  <rect x="390" y="62" width="320" height="44" rx="8" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a73e8" font-family="Arial">Internet Users</text>
  <text x="550" y="96" text-anchor="middle" font-size="10" fill="#444" font-family="Arial">Web browsers / Mobile apps</text>

  <line x1="550" y1="106" x2="550" y2="126" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Route 53 -->
  <rect x="430" y="126" width="240" height="40" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100" font-family="Arial">Amazon Route 53</text>
  <text x="550" y="156" text-anchor="middle" font-size="10" fill="#444" font-family="Arial">DNS + Health-check routing</text>

  <line x1="460" y1="148" x2="310" y2="188" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="166" x2="550" y2="186" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CloudFront -->
  <rect x="130" y="188" width="220" height="44" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="240" y="206" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20" font-family="Arial">Amazon CloudFront</text>
  <text x="240" y="220" text-anchor="middle" font-size="10" fill="#444" font-family="Arial">CDN - Static assets (S3 origin)</text>

  <!-- S3 -->
  <rect x="30" y="258" width="200" height="40" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="274" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20" font-family="Arial">Amazon S3</text>
  <text x="130" y="288" text-anchor="middle" font-size="10" fill="#444" font-family="Arial">Static assets (images, CSS, JS)</text>
  <line x1="200" y1="278" x2="230" y2="222" stroke="#388e3c" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- WAF -->
  <rect x="430" y="186" width="240" height="40" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="202" text-anchor="middle" font-size="11" font-weight="bold" fill="#b71c1c" font-family="Arial">AWS WAF</text>
  <text x="550" y="216" text-anchor="middle" font-size="10" fill="#444" font-family="Arial">OWASP Top 10 protection</text>

  <line x1="550" y1="226" x2="550" y2="248" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ALB -->
  <rect x="390" y="248" width="320" height="44" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="266" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1" font-family="Arial">Application Load Balancer (ALB)</text>
  <text x="550" y="282" text-anchor="middle" font-size="10" fill="#444" font-family="Arial">Health checks | SSL termination | Multi-AZ</text>

  <!-- VPC OUTER BOX -->
  <rect x="22" y="310" width="1058" height="500" rx="12" fill="none" stroke="#90a4ae" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="38" y="328" font-size="11" font-weight="bold" fill="#546e7a" font-family="Arial">VPC  (10.0.0.0/16)</text>

  <!-- PUBLIC SUBNETS -->
  <rect x="36" y="336" width="490" height="92" rx="8" fill="#e1f5fe" stroke="#0288d1" stroke-width="1.5"/>
  <text x="56" y="354" font-size="10" font-weight="bold" fill="#0277bd" font-family="Arial">Public Subnets</text>

  <rect x="56" y="360" width="200" height="56" rx="6" fill="#fff" stroke="#0288d1" stroke-width="1" filter="url(#shadow)"/>
  <text x="156" y="378" text-anchor="middle" font-size="10" font-weight="bold" fill="#0277bd" font-family="Arial">NAT Gateway (AZ-1)</text>
  <text x="156" y="394" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">10.0.1.0/24</text>
  <text x="156" y="408" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Elastic IP attached</text>

  <rect x="275" y="360" width="235" height="56" rx="6" fill="#fff" stroke="#0288d1" stroke-width="1" filter="url(#shadow)"/>
  <text x="392" y="378" text-anchor="middle" font-size="10" font-weight="bold" fill="#0277bd" font-family="Arial">NAT Gateway (AZ-2)</text>
  <text x="392" y="394" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">10.0.2.0/24</text>
  <text x="392" y="408" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Elastic IP attached</text>

  <!-- Internet Gateway -->
  <rect x="542" y="336" width="200" height="56" rx="6" fill="#fff8e1" stroke="#f9a825" stroke-width="1" filter="url(#shadow)"/>
  <text x="642" y="356" text-anchor="middle" font-size="10" font-weight="bold" fill="#f57f17" font-family="Arial">Internet Gateway</text>
  <text x="642" y="372" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Attached to VPC</text>
  <text x="642" y="386" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">ALB ingress / NAT egress</text>

  <!-- SSM -->
  <rect x="762" y="336" width="290" height="56" rx="6" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1" filter="url(#shadow)"/>
  <text x="907" y="356" text-anchor="middle" font-size="10" font-weight="bold" fill="#6a1b9a" font-family="Arial">AWS Systems Manager</text>
  <text x="907" y="372" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Session Manager - No SSH / Port 22 CLOSED</text>
  <text x="907" y="386" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Audited, keyless admin access to EC2</text>

  <!-- PRIVATE SUBNETS - APP TIER -->
  <rect x="36" y="444" width="490" height="172" rx="8" fill="#e8eaf6" stroke="#3949ab" stroke-width="1.5"/>
  <text x="56" y="462" font-size="10" font-weight="bold" fill="#283593" font-family="Arial">Private Subnets - Application Tier</text>

  <rect x="56" y="468" width="460" height="22" rx="4" fill="#c5cae9" stroke="#3949ab" stroke-width="1"/>
  <text x="286" y="483" text-anchor="middle" font-size="10" font-weight="bold" fill="#283593" font-family="Arial">Auto Scaling Group (min: 1 | desired: 2 | max: 6)</text>

  <!-- EC2 AZ1 -->
  <rect x="66" y="496" width="210" height="108" rx="6" fill="#fff" stroke="#3949ab" stroke-width="1" filter="url(#shadow)"/>
  <text x="171" y="514" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a237e" font-family="Arial">EC2 Instance - AZ-1</text>
  <text x="171" y="530" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">t3.medium / m5.large</text>
  <text x="171" y="546" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">10.0.3.0/24 (private subnet)</text>
  <text x="171" y="562" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">SG: allow 443 from ALB SG only</text>
  <text x="171" y="578" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">IAM Instance Role attached</text>
  <text x="171" y="594" text-anchor="middle" font-size="9" fill="#888" font-family="Arial">EBS: encrypted (KMS)</text>

  <!-- EC2 AZ2 -->
  <rect x="296" y="496" width="210" height="108" rx="6" fill="#fff" stroke="#3949ab" stroke-width="1" filter="url(#shadow)"/>
  <text x="401" y="514" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a237e" font-family="Arial">EC2 Instance - AZ-2</text>
  <text x="401" y="530" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">t3.medium / m5.large</text>
  <text x="401" y="546" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">10.0.4.0/24 (private subnet)</text>
  <text x="401" y="562" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">SG: allow 443 from ALB SG only</text>
  <text x="401" y="578" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">IAM Instance Role attached</text>
  <text x="401" y="594" text-anchor="middle" font-size="9" fill="#888" font-family="Arial">EBS: encrypted (KMS)</text>

  <!-- PRIVATE SUBNETS - DB TIER -->
  <rect x="36" y="632" width="490" height="154" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="56" y="650" font-size="10" font-weight="bold" fill="#b71c1c" font-family="Arial">Private Subnets - Database Tier (no internet route)</text>

  <!-- RDS Primary -->
  <rect x="56" y="658" width="210" height="116" rx="6" fill="#fff" stroke="#c62828" stroke-width="1" filter="url(#shadow)"/>
  <text x="161" y="676" text-anchor="middle" font-size="10" font-weight="bold" fill="#b71c1c" font-family="Arial">RDS Primary (AZ-1)</text>
  <text x="161" y="693" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">MySQL / PostgreSQL</text>
  <text x="161" y="709" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Multi-AZ enabled</text>
  <text x="161" y="725" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">SG: allow 3306 from EC2 SG</text>
  <text x="161" y="741" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Encrypted at rest (KMS)</text>
  <text x="161" y="757" text-anchor="middle" font-size="9" fill="#888" font-family="Arial">10.0.5.0/24</text>

  <!-- RDS Standby -->
  <rect x="296" y="658" width="210" height="116" rx="6" fill="#fff" stroke="#c62828" stroke-width="1" filter="url(#shadow)"/>
  <text x="401" y="676" text-anchor="middle" font-size="10" font-weight="bold" fill="#b71c1c" font-family="Arial">RDS Standby (AZ-2)</text>
  <text x="401" y="693" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Synchronous replication</text>
  <text x="401" y="709" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Auto failover (&lt; 120s)</text>
  <text x="401" y="725" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">SG: allow 3306 from EC2 SG</text>
  <text x="401" y="741" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Encrypted at rest (KMS)</text>
  <text x="401" y="757" text-anchor="middle" font-size="9" fill="#888" font-family="Arial">10.0.6.0/24</text>

  <!-- RDS sync arrow -->
  <line x1="266" y1="716" x2="296" y2="716" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="281" y="712" text-anchor="middle" font-size="8" fill="#c62828" font-family="Arial">sync</text>

  <!-- RIGHT PANEL - SUPPORTING SERVICES -->
  <rect x="548" y="444" width="510" height="342" rx="8" fill="#f9fbe7" stroke="#827717" stroke-width="1.5"/>
  <text x="568" y="462" font-size="10" font-weight="bold" fill="#558b2f" font-family="Arial">Supporting and Security Services</text>

  <!-- CloudWatch -->
  <rect x="562" y="468" width="220" height="70" rx="6" fill="#fff" stroke="#f57c00" stroke-width="1" filter="url(#shadow)"/>
  <text x="672" y="485" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100" font-family="Arial">Amazon CloudWatch</text>
  <text x="672" y="500" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Dashboards and metric alarms</text>
  <text x="672" y="515" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Log groups (EC2 and RDS)</text>
  <text x="672" y="530" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">SNS alerts to on-call team</text>

  <!-- GuardDuty + CloudTrail -->
  <rect x="800" y="468" width="240" height="70" rx="6" fill="#fff" stroke="#c62828" stroke-width="1" filter="url(#shadow)"/>
  <text x="920" y="485" text-anchor="middle" font-size="10" font-weight="bold" fill="#b71c1c" font-family="Arial">Amazon GuardDuty</text>
  <text x="920" y="500" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Threat detection (ML-based)</text>
  <text x="920" y="515" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">AWS CloudTrail</text>
  <text x="920" y="530" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Full API audit log (all regions)</text>

  <!-- AWS Backup -->
  <rect x="562" y="554" width="220" height="70" rx="6" fill="#fff" stroke="#388e3c" stroke-width="1" filter="url(#shadow)"/>
  <text x="672" y="571" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20" font-family="Arial">AWS Backup</text>
  <text x="672" y="587" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Daily RDS snapshots</text>
  <text x="672" y="602" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">30-day retention policy</text>
  <text x="672" y="617" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">EBS snapshot schedule</text>

  <!-- KMS + Secrets Manager -->
  <rect x="800" y="554" width="240" height="70" rx="6" fill="#fff" stroke="#7b1fa2" stroke-width="1" filter="url(#shadow)"/>
  <text x="920" y="571" text-anchor="middle" font-size="10" font-weight="bold" fill="#6a1b9a" font-family="Arial">AWS KMS</text>
  <text x="920" y="587" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Encryption: RDS, EBS, S3</text>
  <text x="920" y="602" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">AWS Secrets Manager</text>
  <text x="920" y="617" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">DB credentials and API keys</text>

  <!-- AWS Config -->
  <rect x="562" y="640" width="220" height="70" rx="6" fill="#fff" stroke="#1565c0" stroke-width="1" filter="url(#shadow)"/>
  <text x="672" y="657" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d47a1" font-family="Arial">AWS Config</text>
  <text x="672" y="673" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Compliance rules (tagging,</text>
  <text x="672" y="688" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">encryption, SG checks)</text>
  <text x="672" y="703" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Drift detection</text>

  <!-- Cost Explorer -->
  <rect x="800" y="640" width="240" height="70" rx="6" fill="#fff" stroke="#f57c00" stroke-width="1" filter="url(#shadow)"/>
  <text x="920" y="657" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100" font-family="Arial">AWS Cost Explorer</text>
  <text x="920" y="673" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Savings Plans and Budgets</text>
  <text x="920" y="688" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">AWS Trusted Advisor</text>
  <text x="920" y="703" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Right-sizing recommendations</text>

  <!-- ARROWS: ALB to EC2 -->
  <line x1="470" y1="292" x2="171" y2="496" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="292" x2="401" y2="496" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- EC2 to RDS -->
  <line x1="171" y1="604" x2="161" y2="658" stroke="#3949ab" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="401" y1="604" x2="401" y2="658" stroke="#3949ab" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="36" y="796" width="1040" height="50" rx="6" fill="#eceff1" stroke="#90a4ae" stroke-width="1"/>
  <text x="56" y="814" font-size="9" font-weight="bold" fill="#37474f" font-family="Arial">Security Group Rules:</text>
  <text x="190" y="814" font-size="9" fill="#555" font-family="Arial">ALB SG: inbound 80/443 from 0.0.0.0/0  |  EC2 SG: inbound 443 from ALB SG only  |  RDS SG: inbound 3306 from EC2 SG only  |  Port 22: CLOSED everywhere</text>
  <text x="56" y="834" font-size="9" font-weight="bold" fill="#37474f" font-family="Arial">Encryption:</text>
  <text x="130" y="834" font-size="9" fill="#555" font-family="Arial">All data at rest (KMS)  |  All data in transit (TLS/HTTPS)  |  Availability Zones: AZ-1 and AZ-2 (e.g. us-east-1a / us-east-1b)</text>
</svg>
